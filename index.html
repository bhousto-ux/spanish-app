const getReviewVocabulary = (lesson) => {
  if (!lesson.isReview || !lesson.reviewUnits) {
    return lesson.vocabulary;
  }
  
  // Collect vocabulary from all reviewed units
  const allVocab = [];
  lesson.reviewUnits.forEach(unitId => {
    const unit = LESSONS.find(l => l.id === unitId);
    if (unit && unit.vocabulary) {
      allVocab.push(...unit.vocabulary);
    }
  });
  
  return allVocab;
};

  const allVocab = getReviewVocabulary(lesson);
  const shuffled = [...allVocab].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
};

const loadVoices = () => {
  return new Promise((resolve) => {
    const voices = window.speechSynthesis?.getVoices() || [];

const initVoices = async () => {
  if (voicesLoaded) return;
  
  if ('speechSynthesis' in window) {
    const voices = await loadVoices();
    
    // Priority: Mexican Spanish > Latin American Spanish > Any Spanish
    // Look for voices with these characteristics
    const voicePriority = [
      v => v.lang === 'es-MX',
      v => v.lang === 'es-US', 
      v => v.lang.startsWith('es-') && v.lang !== 'es-ES',
      v => v.lang.startsWith('es') && v.name.toLowerCase().includes('latin'),
      v => v.lang.startsWith('es') && v.name.toLowerCase().includes('mexican'),
      v => v.lang.startsWith('es') && !v.name.toLowerCase().includes('spain'),
      v => v.lang.startsWith('es'),
    ];
    
    for (const test of voicePriority) {
      const found = voices.find(test);
      if (found) {
        spanishVoice = found;
        console.log('Selected Spanish voice:', found.name, found.lang);

};

// Pronunciation helper for words that TTS engines commonly mispronounce
// Maps Spanish words to phonetic hints that sound better with speech synthesis
const pronunciationMap = {
  // Numbers that often get mispronounced
  'nueve': 'nuébeh',      // 9 - prevents "new-ava" pronunciation
  'nuebe': 'nuébeh',      // alternate spelling
  'siete': 'siéteh',      // 7 - clearer pronunciation
  'veinte': 'béinteh',    // 20
  'veintiuno': 'béintiuno', // 21
  'veintidós': 'béintidós', // 22
  'veintitrés': 'béintitrés', // 23
  'veinticuatro': 'béinticuatro', // 24
  'veinticinco': 'béinticinco', // 25
  'veintiséis': 'béintiséis', // 26
  'veintisiete': 'béintisiéteh', // 27
  'veintiocho': 'béintiocho', // 28
  'veintinueve': 'béintinuébeh', // 29
  
  // Single letters/short words that get English pronunciation
  'y': 'ee',              // "and" - should sound like "ee" not "why"
  'Y': 'ee',
  
  // Common problem words
  'hay': 'áy',            // there is/are
  'hoy': 'óy',            // today
  'muy': 'mooy',          // very
  'voy': 'boy',           // I go (v sounds like b)
  'veo': 'beo',           // I see
  'vivo': 'bibo',         // I live
  'nuevo': 'nuébo',       // new
  'nueva': 'nuéba',       // new (fem)
  'lluvia': 'yúbia',      // rain (ll = y sound)
  'llamo': 'yámo',        // I call
  'calle': 'cáyeh',       // street
  'ella': 'éya',          // she
  'ellos': 'éyos',        // they (masc)
  'ellas': 'éyas',        // they (fem)
};

// Apply pronunciation fixes to text
const fixPronunciation = (text) => {
  if (!text) return text;
  
  // For single words, check the map directly
  const lowerText = text.toLowerCase().trim();
  if (pronunciationMap[lowerText]) {
    return pronunciationMap[lowerText];
  }
  if (pronunciationMap[text]) {
    return pronunciationMap[text];
  }
  
  // For phrases, replace words that need fixing
  let fixed = text;
  Object.entries(pronunciationMap).forEach(([word, phonetic]) => {
    // Use word boundaries to avoid partial replacements
    const regex = new RegExp(`\\b${word}\\b`, 'gi');
    fixed = fixed.replace(regex, phonetic);
  });
  
  return fixed;
};

// Play Spanish audio with proper pronunciation
const playSpanishAudio = (text, rate = 0.85) => {
  if (!('speechSynthesis' in window)) return;
  
  // Cancel any ongoing speech
  window.speechSynthesis.cancel();
  
  // Apply pronunciation fixes
  const fixedText = fixPronunciation(text);
  
  // Small delay to ensure cancel completes
  setTimeout(() => {
    const utterance = new SpeechSynthesisUtterance(fixedText);
    
    // Use our pre-selected Spanish voice if available
    if (spanishVoice) {
      utterance.voice = spanishVoice;
    }
    
    utterance.lang = 'es-MX';
    utterance.rate = rate;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;
    
    // Add slight pause at end to prevent cutoff
    utterance.text = fixedText + ' ';
    
    window.speechSynthesis.speak(utterance);
  }, 50);
};

// Normal playback

// Exercise 1: Match Spanish to English
const MatchExercise = ({ vocabulary, onComplete, onWrong }) => {
  const [pairs, setPairs] = useState([]);
  const [selected, setSelected] = useState(null);
  const [matched, setMatched] = useState([]);
  const [shuffledEnglish, setShuffledEnglish] = useState([]);
  const [wrongPair, setWrongPair] = useState(null);
  const [showWrongFeedback, setShowWrongFeedback] = useState(false);
  const [round, setRound] = useState(0);
  const [totalMatched, setTotalMatched] = useState(0);
  const totalRounds = 2; // 2 rounds of 4 matches each = 8 word practices
  const pairsPerRound = 4;

  const setupRound = useCallback((roundNum) => {
    // Get different words for each round, cycling through vocabulary
    const startIdx = (roundNum * pairsPerRound) % vocabulary.length;
    const subset = [];
    for (let i = 0; i < pairsPerRound; i++) {
      subset.push(vocabulary[(startIdx + i) % vocabulary.length]);
    }
    setPairs(subset);
    setShuffledEnglish([...subset].sort(() => Math.random() - 0.5));
    setMatched([]);
    setSelected(null);
    setWrongPair(null);
    setShowWrongFeedback(false);
  }, [vocabulary]);

  useEffect(() => {
    setupRound(0);
  }, [vocabulary]);

  const handleSpanishClick = (word) => {
    if (matched.includes(word.spanish) || showWrongFeedback) return;
    playNativeAudioNormal(word.spanish);
    setSelected(word);
  };

  const handleEnglishClick = (english) => {
    if (!selected || showWrongFeedback) return;
    if (selected.english === english) {
      // Correct match
      const newMatched = [...matched, selected.spanish];
      setMatched(newMatched);
      setSelected(null);
      setTotalMatched(t => t + 1);
      
      if (newMatched.length === pairs.length) {
        // Round complete
        if (round + 1 < totalRounds) {
          setTimeout(() => {
            setRound(round + 1);
            setupRound(round + 1);
          }, 800);
        } else {
          setTimeout(onComplete, 800);
        }
      }
    } else {
      // Wrong match - show feedback
      setWrongPair({ spanish: selected.spanish, english });
      setShowWrongFeedback(true);
      onWrong();
      
      setTimeout(() => {
        setWrongPair(null);
        setShowWrongFeedback(false);
        setSelected(null);
      }, 1500);
    }
  };

  // Background flash for wrong answer
  const getBgColor = () => {
    if (showWrongFeedback) return 'bg-red-50';
    return '';
  };

  return (
    <div className={`space-y-6 p-4 -m-4 rounded-2xl transition-colors duration-300 ${getBgColor()}`}>
      <div className="flex justify-between items-center">
        <h3 className="text-xl font-bold text-gray-700">Match the words! 🎯</h3>
        <div className="text-sm font-bold text-purple-600 bg-purple-100 px-3 py-1 rounded-full">
          Round {round + 1}/{totalRounds}
        </div>
      </div>
      <p className="text-center text-gray-500 text-sm">Tap Spanish, then tap what it means!</p>
      
      {/* Wrong feedback message */}
      {showWrongFeedback && (
        <div className="text-center py-2 rounded-xl bg-red-100 text-red-700 font-bold">
          ✗ Not a match! Try again.
        </div>
      )}
      
      {/* Progress indicator */}
      <div className="flex justify-center gap-1">
        {[...Array(totalRounds * pairsPerRound)].map((_, i) => (
          <div 
            key={i} 
            className={`w-3 h-3 rounded-full ${
              i < totalMatched ? 'bg-green-500' : 'bg-gray-300'
            }`}
          />
        ))}
      </div>
      
      <div className="grid grid-cols-2 gap-4">
        <div className="space-y-3">
          <div className="text-center font-semibold text-purple-600 mb-2">Spanish 🇪🇸</div>
          {pairs.map((word) => {
            const isMatched = matched.includes(word.spanish);
            const isSelected = selected?.spanish === word.spanish;
            const isWrong = showWrongFeedback && wrongPair?.spanish === word.spanish;
            
            return (
              <button
                key={word.spanish}
                onClick={() => handleSpanishClick(word)}
                disabled={isMatched || showWrongFeedback}
                className={`w-full p-4 rounded-xl text-lg font-semibold transition-all duration-200 border-4
                  ${isMatched 
                    ? 'bg-green-200 text-green-700 border-green-400 scale-95' 
                    : isWrong
                      ? 'bg-red-200 text-red-700 border-red-500 scale-95 ring-4 ring-red-300'
                      : isSelected 
                        ? 'bg-purple-500 text-white border-purple-600 scale-105 shadow-lg' 
                        : 'bg-white border-purple-200 hover:border-purple-400 text-purple-700'}`}
              >
                {word.emoji} {word.spanish}
              </button>
            );
          })}
        </div>
        <div className="space-y-3">
          <div className="text-center font-semibold text-blue-600 mb-2">English 🇺🇸</div>
          {shuffledEnglish.map((word) => {
            const isMatched = matched.includes(word.spanish);
            const isWrong = showWrongFeedback && wrongPair?.english === word.english;
            const isCorrectHighlight = showWrongFeedback && selected?.english === word.english;
            
            return (
              <button
                key={word.english}
                onClick={() => handleEnglishClick(word.english)}
                disabled={isMatched || showWrongFeedback}
                className={`w-full p-4 rounded-xl text-lg font-semibold transition-all duration-200 border-4
                  ${isMatched 
                    ? 'bg-green-200 text-green-700 border-green-400 scale-95' 
                    : isWrong
                      ? 'bg-red-200 text-red-700 border-red-500 scale-95 ring-4 ring-red-300'
                      : isCorrectHighlight
                        ? 'bg-green-100 border-green-400 text-green-700 ring-2 ring-green-300'
                        : 'bg-white border-blue-200 hover:border-blue-400 text-blue-700'}`}
              >
                {word.english}
                {isCorrectHighlight && <span className="text-xs block text-green-600">← Correct match</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const ListenExercise = ({ vocabulary, onComplete, onWrong }) => {
  const [currentWord, setCurrentWord] = useState(null);
  const [options, setOptions] = useState([]);
  const [answered, setAnswered] = useState(false);
  const [selectedWord, setSelectedWord] = useState(null);
  const [isCorrect, setIsCorrect] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [questionIndex, setQuestionIndex] = useState(0);
  const [questionQueue, setQuestionQueue] = useState([]);
  const totalQuestions = 7;

  // Build a queue of questions that cycles through all vocabulary multiple times
  useEffect(() => {
    const queue = [];
    // Add all words, then repeat to reach 7 questions
    while (queue.length < totalQuestions) {
      const shuffled = [...vocabulary].sort(() => Math.random() - 0.5);
      queue.push(...shuffled);
    }
    setQuestionQueue(queue.slice(0, totalQuestions));
  }, [vocabulary]);

  const setupQuestion = useCallback((index) => {
    if (index >= questionQueue.length) return;
    
    const correct = questionQueue[index];
    // Get 3 other options from vocabulary
    const others = vocabulary.filter(w => w.spanish !== correct.spanish);
    const wrongOptions = others.sort(() => Math.random() - 0.5).slice(0, 3);
    const opts = [correct, ...wrongOptions].sort(() => Math.random() - 0.5);
    
    setCurrentWord(correct);
    setOptions(opts);
    setAnswered(false);
    setSelectedWord(null);
    setIsCorrect(null);
    setShowHint(false);
    setTimeout(() => playNativeAudioNormal(correct.spanish), 500);
  }, [questionQueue, vocabulary]);

  useEffect(() => {
    if (questionQueue.length > 0) {
      setupQuestion(0);
    }
  }, [questionQueue]);

  const handleSelect = (word) => {
    if (answered) return;
    setAnswered(true);
    setSelectedWord(word);
    const correct = word.spanish === currentWord.spanish;
    setIsCorrect(correct);
    
    if (!correct) {
      onWrong();
    }
    
    setTimeout(() => {
      if (questionIndex + 1 < totalQuestions) {
        setQuestionIndex(questionIndex + 1);
        setupQuestion(questionIndex + 1);
      } else {
        onComplete();
      }
    }, correct ? 1200 : 2000);
  };

  // Determine background color based on answer state
  const getBgColor = () => {
    if (!answered) return 'bg-white';
    return isCorrect ? 'bg-green-50' : 'bg-red-50';
  };

  if (!currentWord) return null;

  return (
    <div className={`space-y-6 p-4 -m-4 rounded-2xl transition-colors duration-300 ${getBgColor()}`}>
      <div className="flex justify-between items-center">
        <h3 className="text-xl font-bold text-gray-700">What do you hear? 👂</h3>
        <div className="text-sm font-bold text-purple-600 bg-purple-100 px-3 py-1 rounded-full">
          {questionIndex + 1}/{totalQuestions}
        </div>
      </div>
      
      <div className="flex gap-2 justify-center">
        <button 
          onClick={() => playNativeAudioSlow(currentWord?.spanish)}
          className="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-3 rounded-full font-semibold transition-all"
        >
          🐢 Slow
        </button>
        <button 
          onClick={() => playNativeAudioNormal(currentWord?.spanish)}
          className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-6 py-3 rounded-full text-lg font-bold shadow-lg hover:shadow-xl transition-all"
        >
          🔊 Play Again
        </button>
      </div>
      
      {/* Feedback message */}
      {answered && (
        <div className={`text-center py-2 rounded-xl font-bold text-lg ${
          isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
        }`}>
          {isCorrect ? '✓ Correct!' : '✗ Not quite!'}
        </div>
      )}
      
      <button
        onClick={() => setShowHint(!showHint)}
        className="mx-auto block text-sm text-purple-600 hover:text-purple-800"
      >
        {showHint ? '▼ Hide help' : '💡 I need help!'}
      </button>
      
      {showHint && currentWord && (
        <div className="bg-purple-50 rounded-xl p-3 text-center">
          <span className="font-bold text-purple-700">{currentWord.pronunciation.simple}</span>
          <p className="text-sm text-gray-600 mt-1">{currentWord.pronunciation.audioTip}</p>
        </div>
      )}

      <div className="grid grid-cols-2 gap-4">
        {options.map((word) => {
          const isThisSelected = selectedWord?.spanish === word.spanish;
          const isThisCorrect = word.spanish === currentWord.spanish;
          const showAsCorrect = answered && isThisCorrect;
          const showAsWrong = answered && isThisSelected && !isThisCorrect;
          
          return (
            <button
              key={word.spanish}
              onClick={() => handleSelect(word)}
              disabled={answered}
              className={`p-6 rounded-2xl text-center transition-all duration-300 border-4
                ${showAsCorrect
                  ? 'bg-green-100 border-green-500 scale-105 ring-4 ring-green-300' 
                  : showAsWrong
                    ? 'bg-red-100 border-red-500 scale-95 ring-4 ring-red-300'
                    : answered 
                      ? 'bg-gray-100 border-gray-200 opacity-50' 
                      : 'bg-white border-gray-200 hover:border-purple-400 hover:shadow-lg'}`}
            >
              <div className="text-4xl mb-2">{word.emoji}</div>
              <div className={`text-lg font-semibold ${
                showAsCorrect ? 'text-green-700' : showAsWrong ? 'text-red-700' : 'text-gray-700'
              }`}>
                {word.english}
              </div>
              {showAsCorrect && <div className="text-green-600 text-sm mt-1">✓ Correct answer</div>}
              {showAsWrong && <div className="text-red-600 text-sm mt-1">✗ Your answer</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
};

// Exercise 3: Word Construction
const WordConstructExercise = ({ vocabulary, onComplete, onWrong }) => {
  const [currentWord, setCurrentWord] = useState(null);
  const [availableWords, setAvailableWords] = useState([]);
  const [selectedWords, setSelectedWords] = useState([]);
  const [status, setStatus] = useState(null);
  const [allWords, setAllWords] = useState([]);
  const [questionIndex, setQuestionIndex] = useState(0);
  const [wordQueue, setWordQueue] = useState([]);
  const totalQuestions = 7;

  // Build queue of words to construct, cycling through vocabulary
  useEffect(() => {
    const multiWordPhrases = vocabulary.filter(v => v.words && v.words.length > 1);
    const pool = multiWordPhrases.length > 0 ? multiWordPhrases : vocabulary;
    
    const queue = [];
    while (queue.length < totalQuestions) {
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      queue.push(...shuffled);
    }
    setWordQueue(queue.slice(0, totalQuestions));
  }, [vocabulary]);

  const setupQuestion = useCallback((index) => {
    if (index >= wordQueue.length) return;
    
    const word = wordQueue[index];
    
    const distractors = [];
    vocabulary.forEach(v => {
      if (v.words) {
        v.words.forEach(w => {
          if (!word.words.includes(w) && !distractors.includes(w)) {
            distractors.push(w);
          }
        });
      }
    });
    
    const commonDistractors = ['Hola', 'Adiós', 'Buenos', 'Buenas', 'días', 'noches', 'tardes', 'luego', 'Hasta', 'Me', 'llamo', 'Mucho', 'gusto', 'Estoy', 'bien', 'Gracias', '¿Cómo', 'estás?', 'te', 'llamas?', '¿Y', 'tú?'];
    commonDistractors.forEach(d => {
      if (!word.words.includes(d) && !distractors.includes(d)) {
        distractors.push(d);
      }
    });
    
    const numDistractors = Math.min(3, distractors.length);
    const shuffledDistractors = distractors.sort(() => Math.random() - 0.5).slice(0, numDistractors);
    const allWordsPool = [...word.words, ...shuffledDistractors].sort(() => Math.random() - 0.5);
    
    setCurrentWord(word);
    setAllWords(allWordsPool);
    setAvailableWords(allWordsPool);
    setSelectedWords([]);
    setStatus(null);
  }, [wordQueue, vocabulary]);

  useEffect(() => {
    if (wordQueue.length > 0) {
      setupQuestion(0);
    }
  }, [wordQueue]);

  const handleWordClick = (word, fromSelected) => {
    if (status) return;
    
    if (fromSelected) {
      setSelectedWords(selectedWords.filter((_, i) => i !== selectedWords.lastIndexOf(word)));
      setAvailableWords([...availableWords, word]);
    } else {
      setSelectedWords([...selectedWords, word]);
      const idx = availableWords.indexOf(word);
      setAvailableWords(availableWords.filter((_, i) => i !== idx));
    }
  };

  const handleCheck = () => {
    const constructed = selectedWords.join(' ');
    const correct = currentWord.words.join(' ');
    
    if (constructed === correct) {
      setStatus('correct');
      playNativeAudioNormal(currentWord.spanish);
      setTimeout(() => {
        if (questionIndex + 1 < totalQuestions) {
          setQuestionIndex(questionIndex + 1);
          setupQuestion(questionIndex + 1);
        } else {
          onComplete();
        }
      }, 1200);
    } else {
      setStatus('wrong');
      onWrong();
      setTimeout(() => {
        setAvailableWords(allWords);
        setSelectedWords([]);
        setStatus(null);
      }, 2000);
    }
  };

  if (!currentWord) return null;

  // Background color based on status
  const getBgColor = () => {
    if (status === 'correct') return 'bg-green-50';
    if (status === 'wrong') return 'bg-red-50';
    return '';
  };

  return (
    <div className={`space-y-6 p-4 -m-4 rounded-2xl transition-colors duration-300 ${getBgColor()}`}>
      <div className="flex justify-between items-center">
        <h3 className="text-xl font-bold text-gray-700">Build the word! 🧱</h3>
        <div className="text-sm font-bold text-purple-600 bg-purple-100 px-3 py-1 rounded-full">
          {questionIndex + 1}/{totalQuestions}
        </div>
      </div>
      
      {/* Status feedback banner */}
      {status && (
        <div className={`text-center py-2 rounded-xl font-bold text-lg ${
          status === 'correct' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
        }`}>
          {status === 'correct' ? '✓ Perfect!' : '✗ Not quite right'}
        </div>
      )}
      
      <div className="text-center">
        <div className="text-5xl mb-3">{currentWord.emoji}</div>
        <div className="text-2xl font-bold text-purple-700">"{currentWord.english}"</div>
        
        <div className="flex gap-2 justify-center mt-3">
          <button 
            onClick={() => playNativeAudioSlow(currentWord.spanish)}
            className="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full"
          >
            🐢 Hear it slow
          </button>
          <button 
            onClick={() => playNativeAudioNormal(currentWord.spanish)}
            className="text-sm bg-purple-100 text-purple-700 px-3 py-1 rounded-full"
          >
            🔊 Hear it
          </button>
        </div>
        
        <div className="mt-2 text-gray-500 text-sm">
          Say it: <span className="font-semibold text-purple-600">{currentWord.pronunciation.simple}</span>
        </div>
      </div>

      <div className={`min-h-20 p-4 rounded-2xl border-4 border-dashed transition-all duration-300 ${
        status === 'correct' ? 'border-green-500 bg-green-100 ring-4 ring-green-300' :
        status === 'wrong' ? 'border-red-500 bg-red-100 ring-4 ring-red-300' :
        'border-gray-300 bg-gray-50'
      }`}>
        <div className="flex flex-wrap gap-2 justify-center min-h-12 items-center">
          {selectedWords.length === 0 ? (
            <span className="text-gray-400 italic">Tap the words below! 👇</span>
          ) : (
            selectedWords.map((word, i) => (
              <button
                key={i}
                onClick={() => handleWordClick(word, true)}
                disabled={status !== null}
                className={`px-4 py-2 rounded-xl font-semibold shadow-md transition-all ${
                  status === 'correct' 
                    ? 'bg-green-500 text-white' 
                    : status === 'wrong'
                      ? 'bg-red-400 text-white'
                      : 'bg-purple-500 text-white hover:bg-purple-600'
                }`}
              >
                {word}
              </button>
            ))
          )}
        </div>
      </div>

      <div className="flex flex-wrap gap-2 justify-center">
        {availableWords.map((word, i) => (
          <button
            key={i}
            onClick={() => handleWordClick(word, false)}
            disabled={status !== null}
            className="px-4 py-2 bg-white border-2 border-gray-300 rounded-xl font-semibold hover:border-purple-400 hover:bg-purple-50 transition-all disabled:opacity-50"
          >
            {word}
          </button>
        ))}
      </div>

      <button
        onClick={handleCheck}
        disabled={selectedWords.length === 0 || status !== null}
        className={`w-full py-4 rounded-xl font-bold text-lg transition-all ${
          status === 'correct' 
            ? 'bg-green-500 text-white' 
            : status === 'wrong'
              ? 'bg-red-500 text-white'
              : 'bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white'
        }`}
      >
        {status === 'correct' ? '✓ You got it! 🎉' : status === 'wrong' ? '✗ Not quite!' : 'Check My Answer ✓'}
      </button>

      {status === 'wrong' && (
        <div className="text-center bg-yellow-50 border-2 border-yellow-300 rounded-xl p-3">
          <div className="text-sm text-gray-600 mb-1">The correct answer is:</div>
          <div className="font-bold text-xl text-purple-700">{currentWord.spanish}</div>
          <div className="text-sm text-gray-500">({currentWord.pronunciation.simple})</div>
        </div>
      )}
    </div>
  );
};

// Exercise 5: Quick Fire
const QuickFireExercise = ({ vocabulary, onComplete, onWrong }) => {
  const [score, setScore] = useState(0);
  const [current, setCurrent] = useState(null);
  const [options, setOptions] = useState([]);
  const [timeLeft, setTimeLeft] = useState(45); // More time for 7 questions
  const [gameOver, setGameOver] = useState(false);
  const [lastAnswer, setLastAnswer] = useState(null); // { word, correct }
  const [showFeedback, setShowFeedback] = useState(false);
  const [wordQueue, setWordQueue] = useState([]);
  const [questionIndex, setQuestionIndex] = useState(0);
  const target = 7;

  // Build queue ensuring each word appears multiple times
  useEffect(() => {
    const queue = [];
    while (queue.length < target + 3) { // Extra buffer for wrong answers
      const shuffled = [...vocabulary].sort(() => Math.random() - 0.5);
      queue.push(...shuffled);
    }
    setWordQueue(queue);
  }, [vocabulary]);

  const setupQuestion = useCallback((index) => {
    if (index >= wordQueue.length) return;
    const correct = wordQueue[index];
    const others = vocabulary.filter(w => w.spanish !== correct.spanish);
    const wrongOption = others[Math.floor(Math.random() * others.length)] || vocabulary[1];
    setCurrent(correct);
    setOptions([correct, wrongOption].sort(() => Math.random() - 0.5));
    setLastAnswer(null);
    setShowFeedback(false);
    playNativeAudioNormal(correct.spanish);
  }, [wordQueue, vocabulary]);

  useEffect(() => {
    if (wordQueue.length > 0) {
      setupQuestion(0);
    }
    const timer = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          setGameOver(true);
          clearInterval(timer);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [wordQueue]);

  useEffect(() => {
    if (score >= target && !gameOver) {
      setGameOver(true);
      setTimeout(onComplete, 500);
    }
  }, [score, gameOver, onComplete]);

  const handleAnswer = (word) => {
    if (gameOver || showFeedback) return;
    const correct = word.spanish === current.spanish;
    setLastAnswer({ word, correct, correctWord: current });
    setShowFeedback(true);
    
    if (correct) {
      setScore(s => s + 1);
    } else {
      onWrong();
    }
    
    // Brief pause to show feedback, then next question
    setTimeout(() => {
      const nextIndex = questionIndex + 1;
      setQuestionIndex(nextIndex);
      setupQuestion(nextIndex);
    }, 600);
  };

  // Background flash color
  const getBgColor = () => {
    if (!showFeedback) return '';
    return lastAnswer?.correct ? 'bg-green-100' : 'bg-red-100';
  };

  return (
    <div className={`space-y-6 p-4 -m-4 rounded-2xl transition-colors duration-200 ${getBgColor()}`}>
      <div className="flex justify-between items-center">
        <div className="text-lg font-bold text-purple-700">⭐ {score}/{target}</div>
        <div className={`text-lg font-bold ${timeLeft < 10 ? 'text-red-500 animate-pulse' : 'text-gray-600'}`}>
          ⏱️ {timeLeft}s
        </div>
      </div>
      <ProgressBar current={score} total={target} color="bg-purple-500" />
      
      {!gameOver ? (
        <>
          <div className="text-center">
            <div className="text-4xl font-bold text-purple-700 mb-1">{current?.spanish}</div>
            <button onClick={() => playNativeAudioNormal(current?.spanish)} className="text-purple-500 mt-1">🔊 Listen</button>
          </div>
          
          {/* Quick feedback indicator */}
          {showFeedback && (
            <div className={`text-center py-1 rounded-lg font-bold ${
              lastAnswer?.correct ? 'text-green-600' : 'text-red-600'
            }`}>
              {lastAnswer?.correct ? '✓' : '✗'}
            </div>
          )}
          
          <div className="flex gap-4 justify-center">
            {options.map((word, i) => {
              const isThisSelected = showFeedback && lastAnswer?.word.spanish === word.spanish;
              const isThisCorrect = word.spanish === current?.spanish;
              const showAsCorrect = showFeedback && isThisCorrect;
              const showAsWrong = isThisSelected && !isThisCorrect;
              
              return (
                <button
                  key={`${word.english}-${i}`}
                  onClick={() => handleAnswer(word)}
                  disabled={showFeedback}
                  className={`flex-1 max-w-xs p-6 rounded-2xl text-xl font-semibold transition-all border-4 ${
                    showAsCorrect 
                      ? 'bg-green-100 border-green-500 text-green-700 scale-105' 
                      : showAsWrong
                        ? 'bg-red-100 border-red-500 text-red-700 scale-95'
                        : 'bg-white border-gray-200 hover:border-purple-400 hover:scale-105'
                  }`}
                >
                  {word.emoji} {word.english}
                </button>
              );
            })}
          </div>
        </>
      ) : (
        <div className="text-center py-8">
          {score >= target ? (
            <div className="text-green-600 text-2xl font-bold">🎉 Super! You got {score}!</div>
          ) : (
            <div className="text-orange-600 text-xl">Time's up! You got {score}/{target}</div>
          )}
        </div>
      )}
    </div>
  );
};

      queue.push(...shuffled);
    }
    
    const qs = queue.slice(0, totalQuestions).map((word, i) => {
      const otherWords = vocabulary.filter(w => w.spanish !== word.spanish);
      const wrongAnswers = otherWords.sort(() => Math.random() - 0.5).slice(0, 3);
      const allAnswers = [word, ...wrongAnswers].sort(() => Math.random() - 0.5);
      
      // Alternate question types
      const type = i % 2 === 0 ? 'spanish-to-english' : 'english-to-spanish';
      
      return {
        word,
        type,
        options: allAnswers,
      };
    });
    setQuestions(qs);
  }, [vocabulary]);

  const currentQuestion = questions[questionIndex];

  const handleAnswer = (answer) => {
    if (selectedAnswer) return;
    setSelectedAnswer(answer);
    setShowingFeedback(true);
    
    const correct = answer.spanish === currentQuestion.word.spanish;
    setIsCorrect(correct);
    
    if (correct) {
      setScore(s => s + 1);
    } else {
      onWrong();
    }

    // Pause to let user process the feedback
    setTimeout(() => {
      if (questionIndex < questions.length - 1) {
        setQuestionIndex(questionIndex + 1);
        setSelectedAnswer(null);
        setIsCorrect(null);
        setShowingFeedback(false);
      } else {
        setShowResult(true);
        if (score + (correct ? 1 : 0) >= passingScore) {
          setTimeout(onComplete, 1500);
        }
      }
    }, 1500);
  };

  if (questions.length === 0) return null;

  if (showResult) {
    const passed = score >= passingScore;
    return (
      <div className="text-center py-8 space-y-6">
        <div className="text-6xl">{passed ? '🏆' : '📚'}</div>
        <h3 className="text-2xl font-bold text-gray-700">
          {passed ? '¡Excelente!' : 'Good try!'}
        </h3>
        <div className="text-xl">
          You got <span className="font-bold text-purple-700">{score}/{questions.length}</span> right!
        </div>
        {passed ? (
          <div className="text-green-600 font-semibold">🎉 Bonus Challenge Complete!</div>
        ) : (
          <div className="text-orange-600">Keep practicing! You need {passingScore}/{totalQuestions} to pass.</div>
        )}
      </div>
    );
  }

  // Background color based on feedback
  const getBgColor = () => {
    if (!showingFeedback) return '';
    return isCorrect ? 'bg-green-50' : 'bg-red-50';
  };

  return (
    <div className={`space-y-6 p-4 -m-4 rounded-2xl transition-colors duration-300 ${getBgColor()}`}>
      <div className="flex justify-between items-center">
        <div className="text-lg font-bold text-purple-700">🏆 Bonus Challenge!</div>
        <div className="text-lg font-bold text-gray-600">
          {questionIndex + 1}/{questions.length}
        </div>
      </div>
      <ProgressBar current={questionIndex + 1} total={questions.length} color="bg-yellow-500" />

      <div className="bg-yellow-50 border-2 border-yellow-300 rounded-xl p-4 text-center">
        <div className="text-sm text-yellow-700 mb-2">
          {currentQuestion.type === 'spanish-to-english' 
            ? '🇪🇸 What does this mean in English?' 
            : '🇺🇸 How do you say this in Spanish?'}
        </div>
        <div className="text-3xl font-bold text-gray-800">
          {currentQuestion.type === 'spanish-to-english' 
            ? currentQuestion.word.spanish 
            : currentQuestion.word.english}
        </div>
        {currentQuestion.type === 'spanish-to-english' && (
          <button 
            onClick={() => playNativeAudioNormal(currentQuestion.word.spanish)}
            className="mt-2 text-purple-600"
          >
            🔊 Listen
          </button>
        )}
      </div>

      {/* Feedback Banner */}
      {showingFeedback && (
        <div className={`text-center py-3 rounded-xl font-bold text-lg ${
          isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
        }`}>
          {isCorrect ? (
            <span>✓ Correct! Great job!</span>
          ) : (
            <span>✗ Not quite. The answer is highlighted below.</span>
          )}
        </div>
      )}

      <div className="grid grid-cols-2 gap-3">
        {currentQuestion.options.map((option, i) => {
          const isSelected = selectedAnswer?.spanish === option.spanish;
          const isCorrectAnswer = option.spanish === currentQuestion.word.spanish;
          const showAsCorrect = showingFeedback && isCorrectAnswer;
          const showAsWrong = isSelected && !isCorrectAnswer;

          return (
            <button
              key={i}
              onClick={() => handleAnswer(option)}
              disabled={!!selectedAnswer}
              className={`p-4 rounded-xl text-lg font-semibold transition-all duration-300 border-4 ${
                showAsCorrect 
                  ? 'bg-green-100 border-green-500 text-green-700 ring-4 ring-green-300 scale-105' 
                  : showAsWrong 
                    ? 'bg-red-100 border-red-500 text-red-700 ring-4 ring-red-300 scale-95' 
                    : showingFeedback
                      ? 'bg-gray-100 border-gray-200 text-gray-400'
                      : 'bg-white border-gray-200 hover:border-purple-400'
              }`}
            >
              <div>
                {currentQuestion.type === 'spanish-to-english' 
                  ? option.english 
                  : option.spanish}
              </div>
              {showAsCorrect && (
                <div className="text-xs mt-1 text-green-600">✓ Correct answer</div>
              )}
              {showAsWrong && (
                <div className="text-xs mt-1 text-red-600">✗ Your answer</div>
              )}
            </button>
          );
        })}
      </div>
      
      {/* Processing indicator */}
      {showingFeedback && (
        <div className="text-center text-gray-500 text-sm animate-pulse">
          {isCorrect ? 'Moving to next question...' : 'Take a moment to review...'}
        </div>
      )}
    </div>
  );
};

    </div>
  );

  // Group lessons by level
  const level1 = LESSONS.filter(l => {
    const unit = typeof l.unit === 'number' ? l.unit : 0;
    return (unit >= 1 && unit <= 14) || ['R1', 'R2', 'R3', 'R4', 'R5'].includes(l.unit);
  });
  const level2 = LESSONS.filter(l => {
    const unit = typeof l.unit === 'number' ? l.unit : 0;
    return (unit >= 15 && unit <= 26) || ['R6', 'R7', 'R8'].includes(l.unit);
  });
  const level3 = LESSONS.filter(l => {
    const unit = typeof l.unit === 'number' ? l.unit : 0;
    return (unit >= 27 && unit <= 38) || ['R9', 'R10', 'R11'].includes(l.unit);
  });
  const level4 = LESSONS.filter(l => {
    const unit = typeof l.unit === 'number' ? l.unit : 0;
    return (unit >= 39 && unit <= 50) || ['R12', 'R13', 'R14'].includes(l.unit);
  });
  const level5 = LESSONS.filter(l => {
    const unit = typeof l.unit === 'number' ? l.unit : 0;
    return (unit >= 51 && unit <= 58) || ['R15', 'R16'].includes(l.unit) || l.unit === 'GRAND';

        className={`w-full flex items-center gap-3 rounded-xl p-3 transition-all
          ${!unlocked || !hasContent
            ? 'bg-gray-100 opacity-60' 
            : completed
              ? 'bg-green-50 border border-green-200 hover:bg-green-100'
              : isReview
                ? 'bg-yellow-50 border border-yellow-200 hover:bg-yellow-100'
                : 'bg-white border border-gray-200 hover:bg-gray-50 hover:shadow'}`}

        <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xl
          ${!unlocked ? 'bg-gray-300' 
            : completed ? 'bg-green-500 text-white' 
            : isReview ? 'bg-yellow-500 text-white' 
            : 'bg-purple-500 text-white'}`}
        >
          {!unlocked ? '🔒' : completed ? '✓' : lesson.icon}

        <div className="flex-1 text-left">
          <div className={`font-semibold text-sm ${!unlocked ? 'text-gray-400' : 'text-gray-800'}`}>

          {!unlocked && (
            <div className="text-xs text-orange-500">🔐 Complete "{getRequiredLessonName(lesson.requiredLesson)}" first</div>

// Vocabulary Teaching Screen - NOW REQUIRES AUDIO PLAY
const VocabTeaching = ({ vocabulary, onContinue, onBack }) => {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [audioPlayedForWord, setAudioPlayedForWord] = useState({});
  const [viewedAll, setViewedAll] = useState(false);

  const currentWordPlayed = audioPlayedForWord[currentIndex] || false;
  const allWordsPlayed = Object.keys(audioPlayedForWord).length === vocabulary.length;

  const handleAudioPlayed = () => {
    setAudioPlayedForWord(prev => ({ ...prev, [currentIndex]: true }));
  };

  const handleNext = () => {
    if (!currentWordPlayed) return; // Can't proceed without listening
    
    if (currentIndex < vocabulary.length - 1) {
      setCurrentIndex(currentIndex + 1);
    } else {
      setViewedAll(true);
    }
  };

  const handlePrev = () => {
    if (currentIndex > 0) {
      setCurrentIndex(currentIndex - 1);
    }
  };

  const canContinue = viewedAll && allWordsPlayed;

  return (
    <div className="min-h-screen bg-gradient-to-b from-indigo-100 to-purple-100 p-6 pb-32">
      <button 
        onClick={onBack}
        className="text-gray-600 hover:text-gray-800 mb-4"
      >
        ← Back
      </button>
      
      <div className="mb-6">
        <ProgressBar current={currentIndex + 1} total={vocabulary.length} color="bg-purple-500" />
        <div className="text-center text-gray-600 mt-2">
          Word {currentIndex + 1} of {vocabulary.length}
        </div>
      </div>

      <h2 className="text-2xl font-bold text-center text-gray-700 mb-2">Learn New Words! 📚</h2>
      
      <p className="text-center text-gray-500 text-sm mb-6">
        👆 You must listen to each word before moving on!
      </p>

      <div className="max-w-md mx-auto">
        <VocabCard 
          key={currentIndex}
          word={vocabulary[currentIndex]} 
          isActive={true}
          showDetails={true}
          onAudioPlayed={handleAudioPlayed}
          hasListened={currentWordPlayed}
        />
      </div>

      <div className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg p-4">
        <div className="max-w-md mx-auto flex justify-center gap-4">
          <button
            onClick={handlePrev}
            disabled={currentIndex === 0}
            className="px-6 py-3 rounded-full font-semibold transition-all disabled:opacity-30 disabled:cursor-not-allowed bg-gray-200 text-gray-700 hover:bg-gray-300"
          >
            ← Back
          </button>
          {canContinue ? (
            <button
              onClick={onContinue}
              className="px-8 py-3 rounded-full font-bold bg-green-500 text-white hover:bg-green-600 transition-all animate-pulse"
            >
              Practice! 🎯
            </button>
          ) : (
            <button
              onClick={handleNext}
              disabled={!currentWordPlayed}
              className={`px-6 py-3 rounded-full font-semibold transition-all ${
                currentWordPlayed 
                  ? 'bg-purple-500 text-white hover:bg-purple-600' 
                  : 'bg-gray-300 text-gray-500 cursor-not-allowed'
              }`}
            >
              {currentWordPlayed ? 'Next →' : '🔊 Listen First!'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

// Exercise Screen - Now includes Bonus Challenge
const ExerciseScreen = ({ lesson, onComplete, hearts, onLoseHeart, onCorrect, onBack }) => {
  const [exerciseIndex, setExerciseIndex] = useState(0);
  const [showCorrect, setShowCorrect] = useState(false);
  const [mistakes, setMistakes] = useState(0);
  const [exerciseCorrects, setExerciseCorrects] = useState(0);

  const isReview = lesson.isReview;
  
  // Get the vocabulary for this lesson (review lessons pull from multiple units)
  const vocabulary = isReview ? getReviewVocabulary(lesson) : lesson.vocabulary;
  
  // Review lessons have more exercises to test retention
  const regularExercises = [
    { type: 'match', Component: MatchExercise },
    { type: 'listen', Component: ListenExercise },
    { type: 'construct', Component: WordConstructExercise },
    { type: 'multiple', Component: MultipleChoiceExercise },
    { type: 'quickfire', Component: QuickFireExercise },
    { type: 'bonus', Component: BonusChallengeExercise },
  ];
  
  // Review lessons cycle through more exercises with shuffled vocabulary
  const reviewExercises = [
    { type: 'match', Component: MatchExercise },
    { type: 'listen', Component: ListenExercise },
    { type: 'multiple', Component: MultipleChoiceExercise },
    { type: 'construct', Component: WordConstructExercise },
    { type: 'match', Component: MatchExercise }, // Second round
    { type: 'quickfire', Component: QuickFireExercise },
    { type: 'listen', Component: ListenExercise }, // More listening
    { type: 'bonus', Component: BonusChallengeExercise },
  ];
  
  const exercises = isReview ? reviewExercises : regularExercises;

  const handleExerciseComplete = (correctCount = 1) => {
    // Track correct answers from this exercise
    if (onCorrect) {
      for (let i = 0; i < correctCount; i++) {
        onCorrect();
      }
    }
    setExerciseCorrects(c => c + correctCount);
    
    setShowCorrect(true);
    setTimeout(() => {
      setShowCorrect(false);
      if (exerciseIndex < exercises.length - 1) {
        setExerciseIndex(exerciseIndex + 1);
      } else {
        onComplete(mistakes === 0);
      }
    }, 1200);
  };

  const handleWrong = () => {
    setMistakes(m => m + 1);
    onLoseHeart();
  };

  const CurrentExercise = exercises[exerciseIndex].Component;
  const isBonus = exercises[exerciseIndex].type === 'bonus';

  return (
    <div className={`min-h-screen p-6 ${isReview 
      ? 'bg-gradient-to-b from-yellow-50 to-orange-50' 
      : 'bg-gradient-to-b from-blue-50 to-purple-50'}`}>
      <StarBurst show={showCorrect} />
      
      <div className="flex justify-between items-center mb-6">
        <button onClick={onBack} className="text-gray-500 hover:text-gray-700 text-xl">✕</button>
        <div className="flex-1 mx-4">
          <ProgressBar 
            current={exerciseIndex + 1} 
            total={exercises.length} 
            color={isBonus ? 'bg-yellow-500' : isReview ? 'bg-orange-500' : 'bg-green-500'} 
          />
          {isReview && !isBonus && (
            <div className="text-center text-orange-600 text-xs mt-1 font-semibold">
              🔄 REVIEW MODE - {lesson.reviewUnits.length} units!
            </div>
          )}
          {isBonus && (
            <div className="text-center text-yellow-600 text-xs mt-1 font-semibold">
              🏆 BONUS CHALLENGE!
            </div>
          )}
        </div>
        <Hearts count={hearts} />
      </div>

      <div className={`rounded-3xl p-6 shadow-xl min-h-96 ${
        isBonus ? 'bg-yellow-50 border-4 border-yellow-400' 
        : isReview ? 'bg-orange-50 border-2 border-orange-300'
        : 'bg-white'
      }`}>
        <CurrentExercise
          vocabulary={vocabulary}
          onComplete={handleExerciseComplete}
          onWrong={handleWrong}
        />
      </div>

      {showCorrect && (
        <div className="fixed inset-0 flex items-center justify-center pointer-events-none z-40">
          <div className="text-4xl font-bold text-green-500 animate-bounce bg-white/90 px-8 py-4 rounded-2xl shadow-2xl">
            {ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]}
          </div>
        </div>
      )}
    </div>
  );
};

export default function SpanishLearningApp() {
  const [screen, setScreen] = useState('loading');
  const [currentLesson, setCurrentLesson] = useState(null);
  const [hearts, setHearts] = useState(5);
  const [correctAnswers, setCorrectAnswers] = useState(0);
  const [totalQuestions, setTotalQuestions] = useState(0);
  const [lessonResult, setLessonResult] = useState({ xpEarned: 0, isPerfect: false, score: null });
  const [isLoaded, setIsLoaded] = useState(false);
  
  // Profile system
  const [appData, setAppData] = useState(DEFAULT_APP_DATA);
  const [currentProfileId, setCurrentProfileId] = useState(null);
  const [creatingProfileSlot, setCreatingProfileSlot] = useState(null);

  // Get current profile
  const currentProfile = currentProfileId ? appData.profiles[currentProfileId] : null;

  // Load app data on mount
  useEffect(() => {
    const load = async () => {
      const saved = await loadAppData();
      setAppData(saved);
      setIsLoaded(true);
      
      // If there's a current profile, go to home, otherwise show profile select
      if (saved.currentProfileId && saved.profiles[saved.currentProfileId]) {
        setCurrentProfileId(saved.currentProfileId);
        setScreen('home');
      } else {
        setScreen('profiles');
      }
    };
    load();
  }, []);

  // Auto-save helper
  const saveCurrentState = async (updatedAppData) => {
    setAppData(updatedAppData);
    await saveAppData(updatedAppData);
  };

  // Profile handlers
  const handleSelectProfile = async (profileId) => {
    setCurrentProfileId(profileId);
    const updated = { ...appData, currentProfileId: profileId };
    await saveCurrentState(updated);
    setScreen('home');
  };

  const handleCreateProfile = (slotId) => {
    setCreatingProfileSlot(slotId);
    setScreen('createProfile');
  };

  const handleSaveNewProfile = async (profileData) => {
    const updated = {
      ...appData,
      currentProfileId: creatingProfileSlot,
      profiles: {
        ...appData.profiles,
        [creatingProfileSlot]: profileData,
      },
    };
    setCurrentProfileId(creatingProfileSlot);
    await saveCurrentState(updated);
    setCreatingProfileSlot(null);
    setScreen('home');
  };

  const handleChangeProfile = () => {
    setScreen('profiles');
  };

  const handleOpenMap = () => {
    setScreen('map');
  };

  // Lesson handlers
  const handleStartLesson = (lesson) => {
    setCurrentLesson(lesson);
    setScreen('intro');
    setHearts(5);
    setCorrectAnswers(0);
    setTotalQuestions(0);
  };

  const handleBeginLesson = () => {
    if (currentLesson.isReview) {
      setScreen('exercises');
    } else {
      setScreen('teaching');
    }
  };

  const handleStartExercises = () => {
    setScreen('exercises');
  };

  const handleLoseHeart = () => {
    setHearts(h => {
      const newHearts = h - 1;
      if (newHearts <= 0) {
        setTimeout(() => setScreen('gameover'), 500);
      }
      return newHearts;
    });
  };

  const handleCorrectAnswer = () => {
    setCorrectAnswers(c => c + 1);
    setTotalQuestions(t => t + 1);
  };

  const handleWrongAnswer = () => {
    setTotalQuestions(t => t + 1);
    handleLoseHeart();
  };

  const handleLessonComplete = async (isPerfect) => {
    const baseXP = currentLesson.isReview ? 75 : 50;
    const bonusXP = isPerfect ? 25 : 0;
    const totalXP = baseXP + bonusXP;
    
    // Calculate score
    const percentage = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 100;
    const stars = calculateStars(percentage);
    
    const scoreData = {
      correct: correctAnswers,
      total: totalQuestions,
      percentage,
      stars,
      hearts,
      lastPlayed: new Date().toISOString(),
    };
    
    setLessonResult({ xpEarned: totalXP, isPerfect, score: scoreData });
    
    // Update profile with new progress and score
    const profile = currentProfile;
    const isFirstCompletion = !profile.lessonsCompleted.includes(currentLesson.id);
    
    const updatedProfile = {
      ...profile,
      totalXP: profile.totalXP + (isFirstCompletion ? totalXP : Math.floor(totalXP / 2)), // Half XP for replays
      lessonsCompleted: profile.lessonsCompleted.includes(currentLesson.id) 
        ? profile.lessonsCompleted 
        : [...profile.lessonsCompleted, currentLesson.id],
      lessonScores: {
        ...profile.lessonScores,
        [currentLesson.id]: scoreData,
      },
      lastPlayedDate: new Date().toISOString(),
    };
    
    const updatedAppData = {
      ...appData,
      profiles: {
        ...appData.profiles,
        [currentProfileId]: updatedProfile,
      },
    };
    
    await saveCurrentState(updatedAppData);
    setScreen('complete');
  };

  const handleRetry = () => {
    setHearts(5);
    setCorrectAnswers(0);
    setTotalQuestions(0);
    setScreen('intro');
  };

  const handleGoHome = () => {
    setScreen('home');
    setHearts(5);
    setCorrectAnswers(0);
    setTotalQuestions(0);
    setCurrentLesson(null);
  };

  if (!isLoaded) {
    return <LoadingScreen />;
  }

  return (
    <div className="max-w-md mx-auto min-h-screen bg-gray-100">
      {screen === 'profiles' && (
        <ProfileSelectScreen
          appData={appData}
          onSelectProfile={handleSelectProfile}
          onCreateProfile={handleCreateProfile}
        />
      )}
      {screen === 'createProfile' && (
        <CreateProfileScreen
          slotId={creatingProfileSlot}
          onSave={handleSaveNewProfile}
          onCancel={() => setScreen('profiles')}
        />
      )}
      {screen === 'home' && currentProfile && (
        <HomeScreen 
          onStartLesson={handleStartLesson} 
          profile={currentProfile}
          onChangeProfile={handleChangeProfile}
          onOpenMap={handleOpenMap}
        />
      )}
      {screen === 'map' && currentProfile && (
        <LessonMapScreen
          profile={currentProfile}
          onStartLesson={handleStartLesson}
          onBack={handleGoHome}
        />
      )}
      {screen === 'intro' && currentLesson && (
        <LessonIntro 
          lesson={currentLesson} 
          onStart={handleBeginLesson}
          onBack={handleGoHome}
        />
      )}
      {screen === 'teaching' && currentLesson && (
        <VocabTeaching 
          vocabulary={currentLesson.vocabulary}
          onContinue={handleStartExercises}
          onBack={() => setScreen('intro')}
        />
      )}
      {screen === 'exercises' && currentLesson && (
        <ExerciseScreen
          lesson={currentLesson}
          hearts={hearts}
          onLoseHeart={handleWrongAnswer}
          onCorrect={handleCorrectAnswer}
          onComplete={handleLessonComplete}
          onBack={handleGoHome}
        />
      )}
      {screen === 'complete' && currentLesson && (
        <LessonComplete
          lesson={currentLesson}
          xpEarned={lessonResult.xpEarned}
          isPerfect={lessonResult.isPerfect}
          score={lessonResult.score}
          onContinue={handleGoHome}
        />
      )}
      {screen === 'gameover' && (
        <GameOver 
          onRetry={handleRetry}
          onHome={handleGoHome}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SpanishLearningApp />);
</script>
</body>
</html>
